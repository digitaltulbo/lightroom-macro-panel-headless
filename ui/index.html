<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lightroom Macro Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Malgun Gothic', sans-serif;
            background: linear-gradient(145deg, #0a0a0f 0%, #0f0f1a 50%, #0a0a0f 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 20px;
            overflow: hidden;
            user-select: none;
        }

        /* Stream Deck 컨테이너 */
        .deck-container {
            background: linear-gradient(180deg, #1a1a2e 0%, #0f0f1a 100%);
            border-radius: 50px;
            border: 3px solid #2a2a3e;
            padding: 60px 80px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.05);
            width: 100%;
            max-width: 1400px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        /* 타이머 표시 (버튼 아래에 위치) */
        .timer-display {
            text-align: center;
            margin-top: 50px;
            padding-top: 40px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: none;
        }

        .timer-display.active {
            display: block;
        }

        .timer-time {
            font-size: 120px;
            font-weight: 700;
            color: #fff;
            text-shadow: 0 0 60px rgba(0, 122, 255, 0.6);
            font-variant-numeric: tabular-nums;
            line-height: 1;
        }

        .timer-label {
            font-size: 20px;
            color: #6b7280;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-top: 15px;
        }

        /* 알림 팝업 */
        .reminder-popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.8);
            background: linear-gradient(145deg, #1a1a2e, #0f0f1a);
            border: 3px solid #FF9F0A;
            border-radius: 30px;
            padding: 50px 80px;
            text-align: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            z-index: 1000;
            box-shadow: 0 0 60px rgba(255, 159, 10, 0.3);
        }

        .reminder-popup.show {
            opacity: 1;
            visibility: visible;
            transform: translate(-50%, -50%) scale(1);
        }

        .reminder-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }

        .reminder-text {
            font-size: 36px;
            font-weight: 700;
            color: #fff;
        }

        /* 버튼 그리드 */
        .button-grid {
            display: flex;
            justify-content: center;
            gap: 40px;
            flex-wrap: wrap;
        }

        /* Stream Deck 버튼 */
        .deck-button {
            width: 200px;
            height: 240px;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .deck-button:active {
            transform: scale(0.95);
        }

        .button-face {
            width: 180px;
            height: 180px;
            background: linear-gradient(145deg, #1a1a2e 0%, #0f0f1a 100%);
            border-radius: 32px;
            border: 3px solid #2a2a3e;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .button-face::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 30px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .deck-button:hover .button-face {
            transform: scale(1.08);
        }

        .button-label {
            margin-top: 16px;
            font-size: 18px;
            font-weight: 600;
            color: #6b7280;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: color 0.3s ease;
            text-align: center;
        }

        /* 색상별 스타일 */
        .btn-blue .button-face {
            border-color: rgba(0, 122, 255, 0.3);
        }

        .btn-blue .button-face::before {
            background: radial-gradient(circle at center, rgba(0, 122, 255, 0.15) 0%, transparent 70%);
        }

        .btn-blue:hover .button-face {
            border-color: #007AFF;
            box-shadow: 0 0 30px rgba(0, 122, 255, 0.4), 0 0 60px rgba(0, 122, 255, 0.2);
        }

        .btn-blue:hover .button-face::before {
            opacity: 1;
        }

        .btn-blue:hover .button-label {
            color: #007AFF;
        }

        .btn-blue .icon-svg {
            color: #007AFF;
        }

        .btn-green .button-face {
            border-color: rgba(52, 199, 89, 0.3);
        }

        .btn-green .button-face::before {
            background: radial-gradient(circle at center, rgba(52, 199, 89, 0.15) 0%, transparent 70%);
        }

        .btn-green:hover .button-face {
            border-color: #34C759;
            box-shadow: 0 0 30px rgba(52, 199, 89, 0.4), 0 0 60px rgba(52, 199, 89, 0.2);
        }

        .btn-green:hover .button-face::before {
            opacity: 1;
        }

        .btn-green:hover .button-label {
            color: #34C759;
        }

        .btn-green .icon-svg {
            color: #34C759;
        }

        .btn-orange .button-face {
            border-color: rgba(255, 159, 10, 0.3);
        }

        .btn-orange .button-face::before {
            background: radial-gradient(circle at center, rgba(255, 159, 10, 0.15) 0%, transparent 70%);
        }

        .btn-orange:hover .button-face {
            border-color: #FF9F0A;
            box-shadow: 0 0 30px rgba(255, 159, 10, 0.4), 0 0 60px rgba(255, 159, 10, 0.2);
        }

        .btn-orange:hover .button-face::before {
            opacity: 1;
        }

        .btn-orange:hover .button-label {
            color: #FF9F0A;
        }

        .btn-orange .icon-svg {
            color: #FF9F0A;
        }

        .btn-yellow .button-face {
            border-color: rgba(255, 204, 0, 0.3);
        }

        .btn-yellow .button-face::before {
            background: radial-gradient(circle at center, rgba(255, 204, 0, 0.15) 0%, transparent 70%);
        }

        .btn-yellow:hover .button-face {
            border-color: #FFCC00;
            box-shadow: 0 0 30px rgba(255, 204, 0, 0.4), 0 0 60px rgba(255, 204, 0, 0.2);
        }

        .btn-yellow:hover .button-face::before {
            opacity: 1;
        }

        .btn-yellow:hover .button-label {
            color: #FFCC00;
        }

        .btn-yellow .icon-svg {
            color: #FFCC00;
        }

        .btn-red .button-face {
            border-color: rgba(255, 69, 58, 0.3);
        }

        .btn-red .button-face::before {
            background: radial-gradient(circle at center, rgba(255, 69, 58, 0.15) 0%, transparent 70%);
        }

        .btn-red:hover .button-face {
            border-color: #FF453A;
            box-shadow: 0 0 30px rgba(255, 69, 58, 0.4), 0 0 60px rgba(255, 69, 58, 0.2);
        }

        .btn-red:hover .button-face::before {
            opacity: 1;
        }

        .btn-red:hover .button-label {
            color: #FF453A;
        }

        .btn-red .icon-svg {
            color: #FF453A;
        }

        .icon-svg {
            width: 80px;
            height: 80px;
            transition: all 0.3s ease;
        }

        .deck-button:hover .icon-svg {
            transform: scale(1.1);
            filter: drop-shadow(0 0 15px currentColor);
        }

        /* 하단 상태바 */
        .status-bar {
            margin-top: auto;
            padding-top: 40px;
        }

        .tip-text {
            color: #4b5563;
            font-size: 20px;
            text-align: center;
            padding: 20px 35px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .status-text {
            color: #6b7280;
            font-size: 16px;
            text-align: center;
            margin-top: 20px;
        }

        /* 클릭 리플 효과 */
        .ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: scale(0);
            animation: ripple-animation 0.6s linear;
            pointer-events: none;
        }

        @keyframes ripple-animation {
            to {
                transform: scale(4);
                opacity: 0;
            }
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }

            50% {
                opacity: 0.8;
                transform: scale(1.05);
            }
        }

        .timer-time.warning {
            color: #FF9F0A;
            animation: pulse 1s ease-in-out infinite;
        }

        .timer-time.critical {
            color: #FF453A;
            animation: pulse 0.5s ease-in-out infinite;
        }

        /* 패키지 선택 팝업 */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .modal-overlay.show {
            opacity: 1;
            visibility: visible;
        }

        .package-modal {
            background: linear-gradient(145deg, #1a1a2e, #0f0f1a);
            border: 3px solid #3a3a5e;
            border-radius: 50px;
            padding: 80px 100px;
            text-align: center;
            transform: scale(0.9);
            transition: transform 0.3s ease;
            max-width: 800px;
            width: 90%;
        }

        .modal-overlay.show .package-modal {
            transform: scale(1);
        }

        .modal-title {
            font-size: 42px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 50px;
        }

        .package-buttons {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .package-btn {
            padding: 40px 60px;
            font-size: 32px;
            font-weight: 600;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .package-btn.basic {
            background: linear-gradient(145deg, #2a2a4e, #1a1a2e);
            border: 3px solid #4a4a6e;
            color: #fff;
        }

        .package-btn.basic:hover {
            border-color: #007AFF;
            box-shadow: 0 0 40px rgba(0, 122, 255, 0.4);
        }

        .package-btn.premium {
            background: linear-gradient(135deg, rgba(218, 165, 32, 0.3), rgba(184, 134, 11, 0.3));
            border: 3px solid rgba(218, 165, 32, 0.8);
            color: #FFD700;
        }

        .package-btn.premium:hover {
            border-color: #DAA520;
            box-shadow: 0 0 40px rgba(218, 165, 32, 0.5);
        }

        .package-time {
            font-size: 20px;
            opacity: 0.7;
            margin-top: 8px;
        }

        .modal-cancel {
            margin-top: 40px;
            background: none;
            border: none;
            color: #6b7280;
            font-size: 20px;
            cursor: pointer;
            transition: color 0.3s;
        }

        .modal-cancel:hover {
            color: #fff;
        }

        /* 비디오 모달 */
        .video-modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(20px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 3000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s ease;
        }

        .video-modal-overlay.show {
            opacity: 1;
            visibility: visible;
        }

        .video-container {
            width: 90%;
            max-width: 1600px;
            aspect-ratio: 16 / 9;
            background: #000;
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 0 100px rgba(0, 0, 0, 0.8), 0 0 30px rgba(255, 255, 255, 0.1);
            position: relative;
            transform: translateY(30px);
            transition: transform 0.4s ease;
        }

        .video-modal-overlay.show .video-container {
            transform: translateY(0);
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .video-close {
            position: absolute;
            top: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            border-radius: 50%;
            color: #fff;
            font-size: 30px;
            cursor: pointer;
            z-index: 3100;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .video-close:hover {
            background: #FF453A;
            transform: rotate(90deg);
        }

        /* 업데이트 모달 전용 스타일 */
        .update-modal {
            max-width: 600px !important;
            border: 2px solid #0A84FF !important;
            box-shadow: 0 0 50px rgba(10, 132, 255, 0.2) !important;
        }

        .update-title {
            color: #0A84FF !important;
            font-size: 32px !important;
            margin-bottom: 20px;
        }

        .update-msg {
            background: rgba(255, 255, 255, 0.05);
            padding: 24px;
            border-radius: 16px;
            margin: 20px 0;
            font-size: 20px;
            line-height: 1.6;
            color: #AEAEB2;
            text-align: left;
        }
    </style>
</head>

<body>
    <!-- 비디오 모달 -->
    <div class="video-modal-overlay" id="videoModal">
        <button class="video-close" onclick="closeVideoModal()">×</button>
        <div class="video-container">
            <video id="guideVideo" controls preload="metadata" playsinline>
                <source src="Crop_guide.mp4" type="video/mp4">
                브라우저가 비디오 태그를 지원하지 않습니다.
            </video>
        </div>
    </div>

    <!-- 내보내기 확인 팝업 -->
    <div class="modal-overlay" id="exportModal">
        <div class="package-modal">
            <div class="modal-title">📂 전체 사진 내보내기</div>
            <div class="update-msg" style="text-align: center;">
                현재 보정된 모든 사진을 바탕화면으로 내보냅니다.<br>
                (150장 기준 약 5분 정도 소요됩니다)
            </div>
            <div class="package-buttons">
                <button class="package-btn premium" onclick="confirmExport()">
                    내보내기 시작
                </button>
                <button class="package-btn basic" onclick="closeExportModal()">
                    취소
                </button>
            </div>
        </div>
    </div>

    <!-- 작업 중 오버레이 (Block Input 효과) -->
    <div class="modal-overlay" id="loadingOverlay" style="background: rgba(0,0,0,0.85); cursor: wait;">
        <div style="text-align: center;">
            <div class="update-title" id="loadingTitle" style="font-size: 40px; margin-bottom: 20px;">설정 중입니다...</div>
            <div style="color: #AEAEB2; font-size: 20px;">마우스와 키보드를 잠시만 기다려주세요.</div>
            <div style="margin-top: 50px;">
                <svg width="100" height="100" viewBox="0 0 100 100">
                    <circle cx="50" cy="50" r="40" stroke="#0A84FF" stroke-width="8" fill="none" stroke-dasharray="180"
                        stroke-linecap="round">
                        <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50"
                            dur="1.5s" repeatCount="indefinite" />
                    </circle>
                </svg>
            </div>
        </div>
    </div>

    <!-- 패키지 선택 팝업 -->
    <div class="modal-overlay" id="packageModal">
        <div class="package-modal">
            <div class="modal-title">📸 촬영 패키지를 선택해주세요</div>
            <div class="package-buttons">
                <button class="package-btn basic" onclick="selectPackage(30)">
                    30분 촬영 - 베이직
                    <div class="package-time">30분 촬영</div>
                </button>
                <button class="package-btn premium" onclick="selectPackage(55)">
                    ⭐ 55분 촬영 - 프리미엄 ⭐
                    <div class="package-time">55분 촬영</div>
                </button>
            </div>
            <button class="modal-cancel" onclick="closePackageModal()">취소</button>
        </div>
    </div>

    <!-- 업데이트 알림 팝업 -->
    <div class="modal-overlay" id="updateModal">
        <div class="package-modal update-modal">
            <div class="modal-title update-title">🚀 새로운 업데이트 발견!</div>
            <div id="updateVersion" style="font-size: 18px; color: #0A84FF; margin-top: -10px;">Version 4.1.1</div>
            <div class="update-msg" id="updateMessage">
                새로운 기능과 성능 개선이 포함된 버전이 준비되었습니다. 지금 즉시 업데이트하시겠습니까?
            </div>
            <div class="package-buttons">
                <button class="package-btn premium" onclick="applyUpdate()">
                    지금 업데이트 하기
                    <div class="package-time">자동으로 다시 시작됩니다</div>
                </button>
                <button class="package-btn basic" onclick="closeUpdateModal()"
                    style="background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.1);">
                    나중에 하기
                </button>
            </div>
        </div>
    </div>

    <!-- 알림 팝업 -->
    <div class="reminder-popup" id="reminderPopup">
        <div class="reminder-icon">⏰</div>
        <div class="reminder-text" id="reminderText">5분 남았습니다!</div>
    </div>

    <div class="deck-container">
        <div class="button-grid">
            <!-- 촬영 시작 -->
            <div class="deck-button btn-blue" onclick="executeAction('tether')">
                <div class="button-face">
                    <svg class="icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z" />
                        <circle cx="12" cy="13" r="4" />
                    </svg>
                </div>
                <span class="button-label">촬영 시작</span>
            </div>

            <!-- 내보내기 -->
            <div class="deck-button btn-green" onclick="executeAction('export')">
                <div class="button-face">
                    <svg class="icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z" />
                        <polyline points="12 11 12 17" />
                        <polyline points="9 14 12 11 15 14" />
                    </svg>
                </div>
                <span class="button-label">내보내기</span>
            </div>

            <!-- 압축하기 -->
            <div class="deck-button btn-orange" onclick="executeAction('compress')">
                <div class="button-face">
                    <svg class="icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 8v13H3V8" />
                        <path d="M23 3H1v5h22V3z" />
                        <path d="M10 12h4" />
                    </svg>
                </div>
                <span class="button-label">압축하기</span>
            </div>

            <!-- 인화 팁 영상 -->
            <div class="deck-button btn-yellow" onclick="showVideoModal()">
                <div class="button-face">
                    <svg class="icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10" />
                        <polygon points="10 8 16 12 10 16 10 8" />
                    </svg>
                </div>
                <span class="button-label">인화 팁</span>
            </div>

            <!-- 촬영 종료 -->
            <div class="deck-button btn-red" onclick="executeAction('end')">
                <div class="button-face">
                    <svg class="icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="3 6 5 6 21 6" />
                        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />
                        <line x1="10" y1="11" x2="10" y2="17" />
                        <line x1="14" y1="11" x2="14" y2="17" />
                    </svg>
                </div>
                <span class="button-label">촬영 종료</span>
            </div>
        </div>

        <!-- 타이머 표시 (버튼 아래로 이동) -->
        <div class="timer-display" id="timerDisplay">
            <div class="timer-time" id="timerTime">55:00</div>
            <div class="timer-label">남은 시간</div>
        </div>

        <div class="status-bar">
            <div class="tip-text" id="tipText">모든 촬영이 끝나면 [촬영 종료] 버튼을 눌러주세요</div>
            <div class="status-text" id="statusText"></div>
        </div>
    </div>

    <script>
        // 패키지 선택 모달
        function showPackageModal() {
            document.getElementById('packageModal').classList.add('show');
        }

        function closePackageModal() {
            document.getElementById('packageModal').classList.remove('show');
        }

        // 비디오 모달 제어
        function showVideoModal() {
            const modal = document.getElementById('videoModal');
            const video = document.getElementById('guideVideo');
            modal.classList.add('show');

            // 약간의 지연 후 재생 및 데이터 로드 최적화
            setTimeout(() => {
                video.muted = false;
                // 영상을 처음부터 다시 로드하여 버퍼링 방지
                video.load();
                video.play().catch(e => {
                    console.error("Video play failed:", e);
                });
            }, 100);

            updateStatus("인화 팁 영상을 재생합니다");
        }

        function closeVideoModal() {
            const modal = document.getElementById('videoModal');
            const video = document.getElementById('guideVideo');
            modal.classList.remove('show');
            video.pause();
            video.currentTime = 0;
        }

        // 업데이트 모달 제어
        function showUpdateModal(data) {
            document.getElementById('updateVersion').textContent = `New Version: ${data.version}`;
            document.getElementById('updateMessage').textContent = data.message;
            document.getElementById('updateModal').classList.add('show');
        }

        function closeUpdateModal() {
            document.getElementById('updateModal').classList.remove('show');
        }

        function applyUpdate() {
            updateStatus("업데이트를 시작합니다. 잠시 후 재시작됩니다...");
            if (window.pywebview && window.pywebview.api) {
                window.pywebview.api.apply_update();
            }
        }

        function selectPackage(minutes) {
            closePackageModal();
            showLoading("촬영 환경 설정 중...");

            if (window.pywebview && window.pywebview.api) {
                window.pywebview.api.start_session(minutes).then(result => {
                    hideLoading();
                    updateStatus(result);
                    document.getElementById('timerDisplay').classList.add('active');
                    document.getElementById('timerTime').textContent =
                        String(minutes).padStart(2, '0') + ':00';
                });
            } else {
                console.log('Start session:', minutes, 'minutes');
                hideLoading();
                updateStatus(`촬영 시작 (${minutes}분)`);
            }
        }

        // 앱 시작 시 버전 체크
        window.addEventListener('pywebviewready', function () {
            setTimeout(() => {
                if (window.pywebview && window.pywebview.api) {
                    window.pywebview.api.check_update().then(result => {
                        if (result && result.available) {
                            showUpdateModal(result);
                        }
                    });
                }
            }, 1000); // 1초 후 체크
        });

        // 내보내기 모달 제어
        function showExportModal() {
            document.getElementById('exportModal').classList.add('show');
        }

        function closeExportModal() {
            document.getElementById('exportModal').classList.remove('show');
        }

        function confirmExport() {
            closeExportModal();
            showLoading("사진 내보내는 중...");

            if (window.pywebview && window.pywebview.api) {
                window.pywebview.api.execute_action('export').then(result => {
                    hideLoading();
                    updateStatus(result);
                });
            }
        }

        // 로딩 오버레이 제어
        function showLoading(title) {
            document.getElementById('loadingTitle').textContent = title || "작업 중입니다...";
            document.getElementById('loadingOverlay').classList.add('show');
        }

        function hideLoading() {
            document.getElementById('loadingOverlay').classList.remove('show');
        }

        // PyWebView API 호출
        function executeAction(action) {
            const button = event.currentTarget;
            createRipple(event, button.querySelector('.button-face'));

            // 촬영 시작 시 패키지 선택 모달 표시
            if (action === 'tether') {
                showPackageModal();
                return;
            }

            // 내보내기 시 확인 모달 표시
            if (action === 'export') {
                showExportModal();
                return;
            }

            // 압축하기/종료 등은 즉시 로딩 표시 후 실행
            if (action === 'compress' || action === 'end') {
                const title = action === 'compress' ? "사진 압축 중..." : "세션 종료 중...";
                showLoading(title);
            }

            if (window.pywebview && window.pywebview.api) {
                window.pywebview.api.execute_action(action).then(result => {
                    hideLoading();
                    updateStatus(result);
                    if (action === 'end') {
                        document.getElementById('timerDisplay').classList.remove('active');
                    }
                });
            } else {
                console.log('Action:', action);
                hideLoading();
                updateStatus('Action: ' + action);
            }
        }

        function createRipple(event, container) {
            const ripple = document.createElement('span');
            ripple.className = 'ripple';
            const rect = container.getBoundingClientRect();
            const size = Math.max(rect.width, rect.height);
            ripple.style.width = ripple.style.height = size + 'px';
            ripple.style.left = (event.clientX - rect.left - size / 2) + 'px';
            ripple.style.top = (event.clientY - rect.top - size / 2) + 'px';
            container.appendChild(ripple);
            setTimeout(() => ripple.remove(), 600);
        }

        function updateStatus(message) {
            const statusEl = document.getElementById('statusText');
            const now = new Date();
            const time = now.toTimeString().split(' ')[0];
            statusEl.textContent = `[${time}] ${message}`;
        }

        // Python에서 호출되는 함수들
        function updateTimer(timeStr) {
            const timerEl = document.getElementById('timerTime');
            timerEl.textContent = timeStr;

            // 시간에 따른 색상 변경
            const [min, sec] = timeStr.split(':').map(Number);
            const totalSec = min * 60 + sec;

            timerEl.classList.remove('warning', 'critical');
            if (totalSec <= 300) {  // 5분 이하
                timerEl.classList.add('critical');
            } else if (totalSec <= 900) {  // 15분 이하
                timerEl.classList.add('warning');
            }
        }

        function showReminder(message) {
            const popup = document.getElementById('reminderPopup');
            const text = document.getElementById('reminderText');
            text.textContent = message;
            popup.classList.add('show');

            setTimeout(() => {
                popup.classList.remove('show');
            }, 5000);
        }

        function onSessionEnd() {
            showReminder('촬영이 종료되었습니다!');
            document.getElementById('timerTime').textContent = '00:00';
        }

        // 팁 로테이션
        const tips = [
            '모든 촬영이 끝나면 [촬영 종료] 버튼을 눌러주세요',
            '사진을 내보내기 전에 보정을 완료해주세요',
            '압축 후 USB나 이메일로 전송할 수 있습니다'
        ];
        let tipIndex = 0;

        setInterval(() => {
            tipIndex = (tipIndex + 1) % tips.length;
            document.getElementById('tipText').textContent = tips[tipIndex];
        }, 8000);

        // 초기화
        document.addEventListener('DOMContentLoaded', () => {
            updateStatus('준비 완료');
        });
    </script>
</body>

</html>
