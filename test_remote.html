<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio Birthday QA Dashboard</title>
    <style>
        :root {
            --bg-color: #0d0d0d;
            --text-color: #f1f1f1;
            --primary-color: #2b5cff;
            --primary-hover: #4a74ff;
            --secondary-color: #8a2be2;
            --secondary-hover: #9c45e8;
            --danger-color: #e53935;
            --danger-hover: #ef5350;
            --surface-color: #1a1a1a;
            --border-color: #333;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem;
        }

        .dashboard {
            background-color: var(--surface-color);
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.6);
            padding: 3rem;
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            gap: 2.5rem;
            border: 1px solid var(--border-color);
        }

        header {
            text-align: center;
        }

        h1 {
            font-size: 1.5rem;
            color: #fff;
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        .ip-config {
            display: flex;
            gap: 10px;
            margin-bottom: -1rem;
        }

        #server-ip {
            flex: 1;
            padding: 1rem;
            background-color: #000;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        #server-ip:focus {
            border-color: var(--primary-color);
        }

        .btn-connect {
            background-color: #333;
            padding: 0 1.5rem;
        }

        .btn-connect:hover {
            background-color: #444;
        }

        .status-display {
            background-color: #000;
            border-radius: 16px;
            padding: 2.5rem 2rem;
            text-align: center;
            border: 1px solid #222;
            box-shadow: inset 0 0 30px rgba(0, 0, 0, 0.9);
        }

        .time {
            font-size: 5rem;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
            color: #fff;
            margin-bottom: 0.5rem;
            line-height: 1;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
        }

        .progress-status {
            font-size: 1rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: 600;
        }

        .progress-status.active {
            color: #4caf50;
            text-shadow: 0 0 10px rgba(76, 175, 80, 0.3);
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        button {
            padding: 1.2rem;
            font-size: 1.1rem;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.5rem;
        }

        button:active {
            transform: scale(0.97);
        }

        .btn-basic {
            background-color: var(--primary-color);
            box-shadow: 0 4px 15px rgba(43, 92, 255, 0.3);
        }

        .btn-basic:hover {
            background-color: var(--primary-hover);
        }

        .btn-premium {
            background-color: var(--secondary-color);
            box-shadow: 0 4px 15px rgba(138, 43, 226, 0.3);
        }

        .btn-premium:hover {
            background-color: var(--secondary-hover);
        }

        .btn-danger {
            background-color: var(--danger-color);
            margin-top: 1rem;
            box-shadow: 0 4px 15px rgba(229, 57, 53, 0.3);
        }

        .btn-danger:hover {
            background-color: var(--danger-hover);
        }

        .server-status {
            font-size: 0.85rem;
            text-align: center;
            margin-top: -1rem;
            color: #666;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #f44336;
        }

        .status-dot.connected {
            background-color: #4caf50;
            box-shadow: 0 0 8px #4caf50;
        }
    </style>
</head>

<body>

    <div class="dashboard">
        <header>
            <h1>스튜디오 생일 QA 대시보드</h1>
        </header>

        <div class="ip-config">
            <input type="text" id="server-ip" value="localhost" placeholder="Windows PC IP 주소 입력">
            <button class="btn-connect" onclick="updateServerUrl()">IP 설정</button>
        </div>

        <div class="status-display">
            <div class="time" id="remaining-time">00:00</div>
            <div class="progress-status" id="progress-status">WAITING SERVER</div>
        </div>

        <div class="controls">
            <button class="btn-basic" onclick="startSession('basic')">
                ✨ 베이직 촬영 시작 (35분)
            </button>
            <button class="btn-premium" onclick="startSession('premium')">
                💎 프리미엄 촬영 시작 (50분)
            </button>
            <button class="btn-danger" onclick="endSession()">
                🚨 긴급 강제 종료
            </button>
        </div>

        <div class="server-status">
            <div id="status-dot" class="status-dot"></div>
            <span id="server-connection">Disconnected</span>
        </div>
    </div>

    <script>
        let SERVER_URL = 'http://localhost:8765';
        let statusInterval;

        const elIpConfig = document.getElementById('server-ip');
        const elTime = document.getElementById('remaining-time');
        const elStatus = document.getElementById('progress-status');
        const elConnection = document.getElementById('server-connection');
        const elStatusDot = document.getElementById('status-dot');

        function updateServerUrl() {
            let ipInput = elIpConfig.value.trim();
            if (!ipInput) ipInput = 'localhost';

            // Check if user accidentally kept 'http://'
            if (!ipInput.startsWith('http://') && !ipInput.startsWith('https://')) {
                SERVER_URL = `http://${ipInput}:8765`;
            } else {
                SERVER_URL = `${ipInput}:8765`;
            }

            console.log("Server URL updated to:", SERVER_URL);
            fetchStatus(); // 즉시 테스트
        }

        function formatTime(seconds) {
            if (seconds == null || isNaN(seconds)) return "00:00";
            if (seconds < 0) seconds = 0;
            const m = Math.floor(seconds / 60);
            const s = Math.floor(seconds % 60);
            return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }

        async function fetchStatus() {
            try {
                const response = await fetch(`${SERVER_URL}/status`);
                if (!response.ok) throw new Error('Server returned ' + response.status);

                const data = await response.json();

                // Expecting backend to provide { remaining_time: number, status: string }
                // Use fallback '00:00' and 'IDLE' if missing fields
                elTime.textContent = formatTime(data.remaining_time !== undefined ? data.remaining_time : 0);
                elStatus.textContent = data.status || 'IDLE';

                if (data.status === 'RUNNING' || data.status === 'SHOOTING') {
                    elStatus.classList.add('active');
                } else {
                    elStatus.classList.remove('active');
                }

                elConnection.textContent = 'Connected';
                elStatusDot.classList.add('connected');
            } catch (error) {
                // Cannot connect or error
                elConnection.textContent = 'Disconnected';
                elStatusDot.classList.remove('connected');
                elStatus.textContent = 'DISCONNECTED';
                elStatus.classList.remove('active');
            }
        }

        async function startSession(packageType) {
            if (!confirm(`[${packageType.toUpperCase()}] 촬영을 시작하시겠습니까?`)) {
                return;
            }

            try {
                const response = await fetch(`${SERVER_URL}/webhook/start`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ package: packageType })
                });

                if (response.ok) {
                    console.log('Successfully started session');
                    fetchStatus(); // 즉시 상태 갱신
                } else {
                    const err = await response.text();
                    alert(`시작 실패: ${err || response.status}`);
                }
            } catch (error) {
                alert(`서버 연결 실패: ${error.message}`);
            }
        }

        async function endSession() {
            if (!confirm('정말 촬영을 긴급 종료하시겠습니까?')) {
                return;
            }

            try {
                const response = await fetch(`${SERVER_URL}/webhook/end`, {
                    method: 'POST'
                });

                if (response.ok) {
                    console.log('Successfully ended session');
                    fetchStatus(); // 즉시 상태 갱신
                } else {
                    const err = await response.text();
                    alert(`종료 실패: ${err || response.status}`);
                }
            } catch (error) {
                alert(`서버 연결 실패: ${error.message}`);
            }
        }

        // Start polling status every 1 second
        statusInterval = setInterval(fetchStatus, 1000);
        // Initial fetch
        fetchStatus();
    </script>
</body>

</html>
